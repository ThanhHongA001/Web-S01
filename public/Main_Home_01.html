<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="../src/styles/main_home_common.css">
    <link rel="stylesheet" href="../src/values/colors.css">
</head>
<body>
    <div class="login-container">
        <h1>Đăng Nhập</h1>
        <form>
            <div class="input-group">
                <input type="text" placeholder="Tên đăng nhập" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Mật khẩu" required>
            </div>
            <div class="button-group">
                <button type="submit" class="login-btn">Đăng nhập</button>
                <button type="button" class="register-btn" onclick="window.location.href='Main_Home_02.html'">Đăng ký</button>
            </div>
        </form>
    </div>
</body>
</html>
